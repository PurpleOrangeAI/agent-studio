name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Install, build, lint, test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Lint workspace
        run: pnpm lint

      - name: Test workspace
        run: pnpm test
