name: Bug report
description: Report a product, adapter, or demo bug in Agent Studio
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What broke
      description: Describe the bug in one or two direct sentences.
      placeholder: The Connect room loads, but the LangGraph quickstart never updates after import.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: List the shortest steps to reproduce it.
      placeholder: |
        1. Open Connect
        2. Import the execution trace template
        3. Navigate to Replay
        4. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, local or deployed, runtime or adapter details.
