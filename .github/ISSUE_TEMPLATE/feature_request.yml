name: Feature request
description: Propose a product, UX, or control-plane improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operator problem is still unsolved?
      placeholder: Replay still gets hard to use when a system has many concurrent spans.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Keep it concrete and product-facing.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Why it matters
      description: Explain the operator value, not just the implementation detail.
